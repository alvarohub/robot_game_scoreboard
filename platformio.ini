; ═══════════════════════════════════════════════════════════════
;  Robot Game Scoreboard — PlatformIO Configuration
; ═══════════════════════════════════════════════════════════════
;
;  Build environments:
;    atoms3-wifi      — M5Stack AtomS3, WiFi connectivity
;    atoms3-ethernet  — M5Stack AtomS3 + Ethernet Unit (W5500/PoE)
;    atoms3-wifi-rs485 — M5Stack AtomS3 + WiFi + Atomic RS485 Base
;    esp32dev-wifi    — Generic ESP32 DevKit, WiFi connectivity
;
;  To build:  pio run -e atoms3-wifi
;  To flash:  pio run -e atoms3-wifi -t upload
;  To monitor: pio device monitor

[platformio]
default_envs = atoms3-wifi

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_echo = yes
lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit NeoMatrix
    adafruit/Adafruit NeoPixel
    cnmat/OSC

; ── M5Stack AtomS3 + WiFi (default dev environment) ─────────
[env:atoms3-wifi]
board = m5stack-atoms3
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_M5UNIFIED
    -DUSE_WIFI
    -DNEOPIXEL_PIN=1
    -DOSC_PORT=9000
;monitor_dtr = 0
;monitor_rts = 0
lib_deps =
    ${env.lib_deps}
    m5stack/M5Unified

; ── M5Stack AtomS3 + Ethernet Unit (W5500 PoE) ─────────────
; When the Grove port is used for Ethernet, NeoPixel data
; must go to a back-pad GPIO (e.g. GPIO 5).
[env:atoms3-ethernet]
board = m5stack-atoms3
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1 
    -DUSE_M5UNIFIED
    -DUSE_ETHERNET_W5500
    -DNEOPIXEL_PIN=5
    -DOSC_PORT=9000
    -DETH_CS_PIN=6
    -DETH_RST_PIN=7
lib_deps =
    ${env.lib_deps}
    m5stack/M5Unified
    arduino-libraries/Ethernet@^2.0.2

; ── M5Stack AtomS3 + WiFi + Atomic RS485 Base ───────────────
; NeoPixel on Grove GPIO1, RS485 on bottom-pad GPIO5(RX)/GPIO6(TX).
[env:atoms3-wifi-rs485]
board = m5stack-atoms3
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSE_M5UNIFIED
    -DUSE_WIFI
    -DUSE_RS485
    -DNEOPIXEL_PIN=1
    -DOSC_PORT=9000
    -DRS485_RX_PIN=5
    -DRS485_TX_PIN=6
    -DRS485_BAUD=115200
lib_deps =
    ${env.lib_deps}
    m5stack/M5Unified

; ── Generic ESP32 DevKit + WiFi ──────────────────────────────
[env:esp32dev-wifi]
board = esp32dev
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1 
    -DUSE_WIFI
    -DNEOPIXEL_PIN=2
    -DOSC_PORT=9000
    -DCORE_DEBUG_LEVEL=0 ; Set to 0 to reduce serial noise, or 3 for debugging